<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCS NQT Verbal Practice</title>

<!-- Fonts: Inter for UI/body text, JetBrains Mono for timers, scores and data -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- Chart.js for progress graphs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ============================================================
   TCS NQT Verbal Practice — stylesheet
   Design: neutral slate surface, single indigo accent,
   semantic red/green/amber reserved for status only.
   ============================================================ */

:root{
  --bg:#F5F6FA;
  --surface:#FFFFFF;
  --surface-alt:#F0F2F7;
  --border:#E3E6EE;
  --text:#151A2E;
  --text-soft:#5B6172;
  --text-faint:#8B91A3;
  --brand:#4338CA;
  --brand-hover:#3730A3;
  --brand-soft:#EEF0FD;
  --brand-ink:#FFFFFF;
  --amber:#B45309;
  --amber-soft:#FEF3E2;
  --green:#0F7A5C;
  --green-soft:#E6F6EF;
  --red:#C0293B;
  --red-soft:#FCEAEC;
  --shadow: 0 1px 2px rgba(20,24,45,.04), 0 1px 8px rgba(20,24,45,.04);
  --radius:10px;
}
html.dark{
  --bg:#0B0E17;
  --surface:#111524;
  --surface-alt:#161B2E;
  --border:#252B42;
  --text:#E9EBF5;
  --text-soft:#AAB0C4;
  --text-faint:#6D7488;
  --brand:#8B85F5;
  --brand-hover:#A29CFF;
  --brand-soft:#1B1E3D;
  --brand-ink:#0B0E17;
  --amber:#E5A445;
  --amber-soft:#2A2010;
  --green:#3FBE93;
  --green-soft:#0E241C;
  --red:#F0687A;
  --red-soft:#2A1319;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 1px 12px rgba(0,0,0,.25);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14.5px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{margin:0; font-weight:700; letter-spacing:-.01em;}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
::selection{background:var(--brand); color:#fff;}
.no-select{user-select:none;-webkit-user-select:none;}
a{color:inherit;}

/* Layout */
.app-shell{display:flex; min-height:100vh;}
.sidebar{
  width:250px; flex:0 0 250px; background:var(--surface);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
}
.main-col{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--border);
  background:var(--surface); position:sticky; top:0; z-index:20;
}
.content{padding:28px 32px; flex:1;}
@media (max-width:860px){
  .sidebar{display:none;}
  .content{padding:18px;padding-bottom:80px;}
  .topbar{padding:14px 18px;}
}

/* Sidebar */
.brand-mark{
  display:flex; align-items:center; gap:10px; padding:20px;
  border-bottom:1px solid var(--border);
}
.brand-mark .logo{
  width:34px; height:34px; border-radius:8px; background:var(--brand);
  display:flex; align-items:center; justify-content:center; color:#fff;
  font-weight:700; font-size:14px; flex:0 0 auto;
}
.brand-mark .name{font-weight:700; font-size:14px; line-height:1.2;}
.brand-mark .sub{font-size:11px; color:var(--text-faint); letter-spacing:.04em;}

.nav{padding:12px; flex:1; overflow-y:auto;}
.nav-link{
  display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px;
  color:var(--text-soft); font-weight:600; font-size:13.5px; cursor:pointer;
  margin-bottom:2px;
}
.nav-link svg{flex:0 0 auto; opacity:.85;}
.nav-link:hover{background:var(--surface-alt); color:var(--text);}
.nav-link.active{background:var(--brand-soft); color:var(--brand);}
.nav-link.active svg{opacity:1;}
.nav-group-label{font-size:10.5px; font-weight:700; letter-spacing:.08em; color:var(--text-faint); padding:14px 12px 6px;}

.sidebar-footer{padding:14px; border-top:1px solid var(--border);}
.mini-profile{display:flex; align-items:center; gap:9px; margin-bottom:10px;}
.mini-avatar{
  width:30px; height:30px; border-radius:50%; background:var(--brand);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:12px; flex:0 0 auto;
}
.mini-profile .name{font-size:13px; font-weight:600;}
.mini-profile .streak{font-size:11px; color:var(--text-faint);}

/* Mobile bottom nav */
.mobile-nav{
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-top:1px solid var(--border);
  padding:6px 4px; z-index:40; justify-content:space-around;
}
@media (max-width:860px){ .mobile-nav{display:flex;} }
.mobile-nav button{
  background:none; border:none; padding:8px; border-radius:8px; color:var(--text-faint);
}
.mobile-nav button.active{color:var(--brand); background:var(--brand-soft);}

/* Buttons */
.btn{
  font-weight:600; font-size:13.5px; border-radius:8px; padding:9px 16px;
  border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center;
  gap:7px; transition:background .12s,border-color .12s,opacity .12s;
  font-family:inherit;
}
.btn-primary{background:var(--brand); color:var(--brand-ink);}
.btn-primary:hover{background:var(--brand-hover);}
.btn-secondary{background:var(--surface); border-color:var(--border); color:var(--text);}
.btn-secondary:hover{border-color:var(--brand); color:var(--brand);}
.btn-sm{padding:6px 11px; font-size:12.5px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn-icon{padding:8px; border-radius:8px;}

/* Cards & surfaces */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.pad-lg{padding:24px;}
.pad-md{padding:18px;}

/* Chip / badge */
.chip{
  display:inline-flex; align-items:center; font-size:11px; font-weight:700;
  letter-spacing:.02em; padding:3px 9px; border-radius:6px;
}
.chip-brand{background:var(--brand-soft); color:var(--brand);}
.chip-amber{background:var(--amber-soft); color:var(--amber);}
.chip-green{background:var(--green-soft); color:var(--green);}
.chip-red{background:var(--red-soft); color:var(--red);}
.chip-neutral{background:var(--surface-alt); color:var(--text-soft);}

/* Stat grid */
.stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:0;}
.stat{text-align:center; padding:6px 4px;}
.stat .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:19px;}
.stat .l{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;}

/* Progress bar */
.bar-track{background:var(--surface-alt); border-radius:999px; height:6px; overflow:hidden;}
.bar-fill{height:100%; background:var(--brand); border-radius:999px; transition:width .35s ease;}

/* Forms */
textarea, input[type=text]{
  width:100%; background:var(--surface-alt); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:10px 12px; font-family:inherit; font-size:14px;
}
textarea:focus, input:focus{outline:2px solid var(--brand); outline-offset:1px;}
label.field-label{font-size:11.5px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:6px;}

/* Timer ring */
.timer-ring-wrap{position:relative; width:104px; height:104px; margin:0 auto;}
.timer-ring-wrap svg{transform:rotate(-90deg); width:100%; height:100%;}
.timer-ring-text{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px;
}

/* Diff highlighting */
.diff-miss{background:var(--red-soft); color:var(--red); text-decoration:line-through; padding:0 2px; border-radius:3px;}
.diff-extra{background:var(--green-soft); color:var(--green); padding:0 2px; border-radius:3px;}

/* Question palette */
.palette-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
.palette-item{
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; border-radius:6px;
  padding:7px 0; text-align:center; border:1px solid var(--border); cursor:pointer; background:var(--surface);
}
.palette-item.answered{background:var(--green-soft); color:var(--green); border-color:transparent;}
.palette-item.current{background:var(--brand); color:#fff; border-color:transparent;}

/* Misc */
.divider{height:1px; background:var(--border);}
.empty-state{padding:48px 24px; text-align:center; color:var(--text-faint);}
.fade-in{animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
.section-heading{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin-bottom:10px;}
.loading-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--brand); margin-right:6px; animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

@media print{
  .no-print{display:none!important;}
  .sidebar,.topbar,.mobile-nav{display:none!important;}
  body{background:#fff; color:#000;}
}

</style>
</head>

/* ---- persistent storage (per-user key/value store) ---- */
async function sGet(key, shared=false){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared=false){
  try{ await window.storage.set(key, JSON.stringify(value), shared); }
  catch(e){ console.warn('storage write failed:', key, e); }
}
async function sList(prefix, shared=false){
  try{ const r = await window.storage.list(prefix, shared); return r ? r.keys : []; }
  catch(e){ return []; }
}

/* ---- generic helpers ---- */
function uid(){ return Math.random().toString(36).slice(2,10); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function fmtTime(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60), s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function dayOfYear(){ const now=new Date(); const start=new Date(now.getFullYear(),0,0); return Math.floor((now-start)/864e5); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---- audio cue for timer expiry (two-tone chime, no external asset) ---- */
function playChime(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const tone = (freq, delay, dur)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=freq;
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime+dur+0.05);
      }, delay);
    };
    tone(740,0,0.28); tone(988,220,0.32);
  }catch(e){ /* audio unsupported — fail silently */ }
}

/* ---- word-level diff (LCS-based) used in Passage Recall review ---- */
function wordDiff(a,b){
  const A=a.split(/\s+/).filter(Boolean), B=b.split(/\s+/).filter(Boolean);
  const n=A.length,m=B.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--){
    dp[i][j] = A[i].toLowerCase().replace(/[^\w]/g,'')===B[j].toLowerCase().replace(/[^\w]/g,'') ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j],dp[i][j+1]);
  }
  let i=0,j=0; const origParts=[], userParts=[];
  while(i<n&&j<m){
    if(A[i].toLowerCase().replace(/[^\w]/g,'')===B[j].toLowerCase().replace(/[^\w]/g,'')){
      origParts.push({t:A[i],miss:false}); userParts.push({t:B[j],extra:false}); i++; j++;
    } else if(dp[i+1][j] >= dp[i][j+1]){
      origParts.push({t:A[i],miss:true}); i++;
    } else {
      userParts.push({t:B[j],extra:true}); j++;
    }
  }
  while(i<n){ origParts.push({t:A[i],miss:true}); i++; }
  while(j<m){ userParts.push({t:B[j],extra:true}); j++; }
  return {origParts,userParts};
}
function renderDiff(parts, kind){
  return parts.map(p=>{
    if(kind==='orig') return p.miss ? `<span class="diff-miss">${escapeHtml(p.t)}</span>` : escapeHtml(p.t);
    return p.extra ? `<span class="diff-extra">${escapeHtml(p.t)}</span>` : escapeHtml(p.t);
  }).join(' ');
}

/* ---- AI evaluation / generation via the Claude API ---- */
async function callClaude(systemPrompt, userPrompt, maxTokens=1000){
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:maxTokens,
        system: systemPrompt,
        messages:[{role:'user', content:userPrompt}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){
    console.warn('AI evaluation unavailable, using offline scoring:', e);
    return null;
  }
}

/* ============================================================
   timer.js — countdown ring component used across all sections
   ============================================================ */

let TIMER_HANDLE = null;
const RING_R = 44;
const RING_CIRC = 2*Math.PI*RING_R;

function timerRingHTML(id, totalSec, color){
  return `
  <div class="timer-ring-wrap">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="${RING_R}" fill="none" stroke="var(--border)" stroke-width="7"/>
      <circle id="${id}-ring" cx="50" cy="50" r="${RING_R}" fill="none" stroke="${color}" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="${RING_CIRC}" stroke-dashoffset="0"
        style="transition:stroke-dashoffset 1s linear;"/>
    </svg>
    <div id="${id}-text" class="timer-ring-text">${fmtTime(totalSec)}</div>
  </div>`;
}

function startTimer(totalSec, onTick, onEnd, ringId){
  clearInterval(TIMER_HANDLE);
  let remaining = totalSec;
  const update = ()=>{
    const ring = document.getElementById(ringId+'-ring');
    const text = document.getElementById(ringId+'-text');
    if(ring) ring.style.strokeDashoffset = RING_CIRC*(1-remaining/totalSec);
    if(text){
      text.textContent = fmtTime(remaining);
      text.style.color = remaining<=10 ? 'var(--red)' : 'var(--text)';
    }
    if(onTick) onTick(remaining);
  };
  update();
  TIMER_HANDLE = setInterval(()=>{
    remaining--;
    if(remaining<=0){
      clearInterval(TIMER_HANDLE);
      remaining=0; update();
      playChime();
      if(onEnd) onEnd();
      return;
    }
    update();
  },1000);
}
function stopTimer(){ clearInterval(TIMER_HANDLE); }

function defaultProg(){ return {setsCompleted:0, bestScore:0, totalScore:0, timeSpentSec:0}; }

let PASSAGE_RUN=null, BLANK_RUN=null, EMAIL_RUN=null;

async function boot(){
  PROFILE   = await sGet('profile')          || {name:'Guest Aspirant', email:'', joined: todayStr()};
  PROGRESS.passage = await sGet('progress:passage') || defaultProg();
  PROGRESS.blanks  = await sGet('progress:blanks')  || defaultProg();
  PROGRESS.email   = await sGet('progress:email')   || defaultProg();
  HISTORY   = await sGet('history')          || [];
  STREAK    = await sGet('streak')           || {current:0,longest:0,lastDate:null};
  BOOKMARKS = await sGet('bookmarks')        || [];
  MISTAKES  = await sGet('mistakes')         || [];
  THEME     = await sGet('theme')            || 'light';
  applyTheme();
  render();
}

function applyTheme(){ document.documentElement.classList.toggle('dark', THEME==='dark'); }
function toggleTheme(){ THEME = THEME==='dark'?'light':'dark'; applyTheme(); sSet('theme',THEME); render(); }

async function saveProgress(section){ await sSet('progress:'+section, PROGRESS[section]); }

async function pushHistory(entry){
  HISTORY.push(entry);
  await sSet('history', HISTORY);
  await bumpStreak();
}
async function bumpStreak(){
  const t = todayStr();
  if(STREAK.lastDate===t) return;
  const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
  STREAK.current = (STREAK.lastDate===yesterday) ? STREAK.current+1 : 1;
  STREAK.longest = Math.max(STREAK.longest, STREAK.current);
  STREAK.lastDate = t;
  await sSet('streak', STREAK);
}
async function addMistake(m){
  MISTAKES.unshift({...m, id:uid(), date:todayStr()});
  MISTAKES = MISTAKES.slice(0,200);
  await sSet('mistakes', MISTAKES);
}
async function toggleBookmark(item){
  const idx = BOOKMARKS.findIndex(b=>b.text===item.text);
  if(idx>-1) BOOKMARKS.splice(idx,1); else BOOKMARKS.unshift({...item, id:uid(), date:todayStr()});
  await sSet('bookmarks', BOOKMARKS);
}
async function saveProfile(name, email){
  PROFILE.name = name.trim() || 'Guest Aspirant';
  PROFILE.email = email.trim();
  await sSet('profile', PROFILE);
}

        ${['Random',...DIFFICULTIES].map((d,i)=>`<button class="btn btn-sm diff-btn ${i===0?'btn-primary':'btn-secondary'}" data-d="${d}" onclick="pickDiff(this)">${d}</button>`).join('')}

async function startPassageSet(){
  PASSAGE_RUN = {passages:[], idx:0, phase:'loading', results:[], startedAt:Date.now()};
  go('passage-run');
  const diffs = SELECTED_DIFF==='Random' ? DIFFICULTIES : [SELECTED_DIFF];
  const cats = pick(CATEGORIES,4);
  const ai = await callClaude(
    "You generate short TCS NQT style verbal-ability passages for a recall exercise. Always reply with ONLY a JSON array, no markdown, no commentary.",
    `Generate exactly 4 SHORT professional/workplace passages, each only 3 to 5 sentences long (40 to 70 words each) — as a JSON array: [{"category":"...","difficulty":"Easy|Medium|Hard","text":"..."}]. Use these categories in order: ${cats.join(', ')}. Order the 4 passages from easier to harder: the first should be Easy (simple vocabulary, short sentences), the next two Medium, and the last Hard (denser vocabulary, one longer sentence), drawing from ${diffs.join(', ')}. Each passage must be self-contained, factual-sounding, formal English suitable for a corporate aptitude test. Keep every passage brief — do not exceed 5 sentences under any circumstance.`,
    1400
  );
  let passages;
  if(Array.isArray(ai) && ai.length>=4){
    passages = ai.slice(0,4).map(p=>({category:p.category||'General', difficulty:p.difficulty||'Medium', text:p.text}));
  } else {
    const filtered = PASSAGE_BANK.filter(p=>diffs.includes(p.difficulty));
    passages = pick(filtered.length>=4?filtered:PASSAGE_BANK,4);
  }
  PASSAGE_RUN.passages = passages;
  PASSAGE_RUN.phase = 'reading';
  render();
  runPassageReading();
}

function runPassageReading(){
  PASSAGE_RUN.phase='reading';
  render();
  startTimer(30, null, ()=>{ PASSAGE_RUN.phase='writing'; PASSAGE_RUN.userText=''; render(); startPassageWriting(); }, 'pTimer');
}
function startPassageWriting(){
  startTimer(90, null, ()=>submitPassageRecall(true), 'pTimer');
}

  if(!PASSAGE_RUN) return `<div class="empty-state">Loading…</div>`;

  return `

      ` : `
        <div class="section-heading" style="color:var(--amber);">Step 2 · Write from memory</div>
        <textarea id="recallBox" style="height:260px;" placeholder="Type everything you remember from the passage…" oninput="PASSAGE_RUN.userText=this.value"></textarea>

      `}

    </div>

function loadingCard(title, sub){
  return `<div class="card empty-state"><div class="loading-dot"></div><span style="font-weight:700; color:var(--text);">${title}</span><div style="margin-top:6px; font-size:13px;">${sub}</div></div>`;
}

async function submitPassageRecall(auto){
  stopTimer();
  const userText = (PASSAGE_RUN.userText||'').trim();
  PASSAGE_RUN.phase='evaluating';
  render();
  const p = PASSAGE_RUN.passages[PASSAGE_RUN.idx];
  const ai = await callClaude(
    "You are an expert TCS NQT verbal-ability evaluator. Compare an original passage with a user's recalled version and score it. Reply with ONLY valid JSON, no markdown.",
    `ORIGINAL PASSAGE:\n${p.text}\n\nUSER'S RECALLED VERSION:\n${userText||'(nothing written)'}\n\nReturn JSON exactly in this shape:\n{"accuracy":0-100,"similarity":0-100,"missingInfo":["..."],"extraInfo":["..."],"grammar":0-10,"sentenceStructure":0-10,"vocabulary":0-10,"logicalFlow":0-10,"overallScore":0-10,"suggestions":["...","...","..."]}`,
    900
  );
  const evalResult = ai || fallbackPassageEval(p.text, userText);
  const diff = wordDiff(p.text, userText);
  PASSAGE_RUN.results.push({passage:p, userText, evalResult, diff});
  PASSAGE_RUN.phase='result';
  render();
}

function fallbackPassageEval(orig,user){
  const ow = orig.toLowerCase().match(/\w+/g)||[];
  const uw = user.toLowerCase().match(/\w+/g)||[];
  const oset = new Set(ow);
  const overlap = uw.filter(w=>oset.has(w)).length;
  const accuracy = ow.length ? Math.min(100, Math.round((overlap/ow.length)*100)) : 0;
  return {
    accuracy, similarity:accuracy,
    missingInfo:["Some details from the passage were not recalled — check names, numbers and the closing sentence."],
    extraInfo: uw.length>ow.length*1.2 ? ["The answer contains content not present in the original passage."] : [],
    grammar:7, sentenceStructure:7, vocabulary:6, logicalFlow:6, overallScore:Math.max(1,Math.round(accuracy/10)),
    suggestions:["Recall the opening and closing sentence precisely.","Prioritise names, numbers and dates.","Summarise each idea in one line while reading."]
  };
}

async function nextPassage(){
  if(PASSAGE_RUN.idx+1 < PASSAGE_RUN.passages.length){
    PASSAGE_RUN.idx++;
    runPassageReading();
  } else {
    const results = PASSAGE_RUN.results;
    const avgScore = Math.round(results.reduce((s,r)=>s+r.evalResult.overallScore,0)/results.length*10);
    PROGRESS.passage.setsCompleted++;
    PROGRESS.passage.totalScore += avgScore;
    PROGRESS.passage.bestScore = Math.max(PROGRESS.passage.bestScore, avgScore);
    PROGRESS.passage.timeSpentSec += Math.round((Date.now()-PASSAGE_RUN.startedAt)/1000);
    await saveProgress('passage');
    await pushHistory({date:todayStr(), section:'passage', score:avgScore});
    go('passage-report');
  }
}

function viewBlanksSetup(){
  const p = PROGRESS.blanks;

  return `
  <div style="display:grid; grid-template-columns:2fr 1fr; gap:18px;">

      <h2 style="font-size:16px; margin-bottom:8px;">New practice paper</h2>
      <p style="font-size:13.5px; color:var(--text-soft); margin-bottom:18px;">20 questions, 8 minutes, no options shown — matching the latest TCS NQT pattern. Covers vocabulary, prepositions, tenses, idioms, phrasal verbs, collocations and business English.</p>
      <button class="btn btn-primary" onclick="startBlanksPaper()">Start paper</button>

      </div>
    </div>
  </div>`;
}

async function startBlanksPaper(){
  BLANK_RUN = {qs:[], idx:0, answers:{}, startedAt:Date.now(), submitted:false};
  go('blanks-run');
  const ai = await callClaude(
    "You generate TCS NQT style fill-in-the-blank English questions. Reply with ONLY a JSON array, no markdown.",
    `Generate exactly 20 fill-in-the-blank questions for a corporate English aptitude test. Mix these types evenly: Vocabulary, Prepositions, Articles, Conjunctions, Verb Forms, Tenses, Subject Verb Agreement, Idioms, Phrasal Verbs, Collocations, Word Choice, Sentence Completion, Business English, Corporate Communication. Reply as a JSON array: [{"sentence":"... ___ ...","answers":["correctword","altword"],"type":"...","difficulty":"Easy|Medium|Hard","explanation":"...","vocab":"..."}]. Mark the blank with three underscores ___.`,
    3000
  );
  let qs;
  if(Array.isArray(ai) && ai.length>=15){
    qs = ai.slice(0,20).map(q=>({...q, answers: Array.isArray(q.answers)?q.answers:[String(q.answers)]}));
  } else {
    qs = pick(FILLBLANK_BANK, Math.min(20,FILLBLANK_BANK.length));
    while(qs.length<20) qs.push(FILLBLANK_BANK[Math.floor(Math.random()*FILLBLANK_BANK.length)]);
  }
  BLANK_RUN.qs = qs;
  render();
  startTimer(8*60, null, ()=>submitBlanksPaper(true), 'bTimer');
}

function viewBlanksRun(){
  if(!BLANK_RUN) return `<div class="empty-state">Loading…</div>`;
  if(!BLANK_RUN.qs.length) return loadingCard('Generating your paper', 'Preparing 20 fill-in-the-blank questions.');
  const q = BLANK_RUN.qs[BLANK_RUN.idx];
  const parts = q.sentence.split('___');
  return `
  <div style="display:grid; grid-template-columns:3fr 1fr; gap:18px;">
    <div class="card pad-lg">
      <div style="display:flex; justify-content:space-between; margin-bottom:18px;">
        <span class="chip chip-brand">Question ${BLANK_RUN.idx+1} of 20</span>
        <span class="chip chip-amber">${q.type||''}</span>
      </div>
      <div style="font-size:16.5px; line-height:1.8; margin-bottom:24px;">
        ${escapeHtml(parts[0]||'')}<input id="blankInput" type="text" style="display:inline-block; width:160px; text-align:center; font-weight:600;" placeholder="______" value="${escapeHtml(BLANK_RUN.answers[BLANK_RUN.idx]||'')}" oninput="BLANK_RUN.answers[BLANK_RUN.idx]=this.value; refreshPalette();">${escapeHtml(parts[1]||'')}
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="blankNav(-1)" ${BLANK_RUN.idx===0?'disabled':''}>Previous</button>
        <button class="btn btn-secondary" onclick="blankNav(1)" ${BLANK_RUN.idx===19?'disabled':''}>Next</button>
        <button class="btn btn-primary" style="margin-left:auto;" onclick="confirmSubmitBlanks()">Submit paper</button>
      </div>
    </div>
    <div class="card pad-lg">
      <div class="section-heading" style="text-align:center;">Time left</div>
      ${timerRingHTML('bTimer',8*60,'var(--brand)')}
      <div class="section-heading" style="margin-top:20px;">Question palette</div>
      <div class="palette-grid" id="palette">${paletteHTML()}</div>
    </div>
  </div>`;
}
function paletteHTML(){
  return BLANK_RUN.qs.map((_,i)=>{
    const answered = !!(BLANK_RUN.answers[i]||'').trim();
    const cur = i===BLANK_RUN.idx;
    return `<button class="palette-item ${cur?'current':answered?'answered':''}" onclick="blankGoto(${i})">${i+1}</button>`;
  }).join('');
}
function refreshPalette(){ const el=document.getElementById('palette'); if(el) el.innerHTML=paletteHTML(); }
function blankNav(d){ BLANK_RUN.idx = Math.min(19,Math.max(0,BLANK_RUN.idx+d)); render(); }
function blankGoto(i){ BLANK_RUN.idx=i; render(); }
function confirmSubmitBlanks(){ if(confirm('Submit the paper now? You cannot edit answers after submitting.')) submitBlanksPaper(false); }

async function submitBlanksPaper(auto){
  if(BLANK_RUN.submitted) return;
  BLANK_RUN.submitted=true;
  stopTimer();
  let correct=0;
  const details = BLANK_RUN.qs.map((q,i)=>{
    const userAns = (BLANK_RUN.answers[i]||'').trim();
    const ok = q.answers.some(a=>a.toLowerCase().trim()===userAns.toLowerCase());
    if(ok) correct++;
    else addMistake({sentence:q.sentence, userAnswer:userAns, correct:q.answers[0], explanation:q.explanation, type:q.type});
    return {...q, userAns, ok};
  });
  const accuracy = Math.round((correct/BLANK_RUN.qs.length)*100);
  BLANK_RUN.details = details; BLANK_RUN.correct = correct; BLANK_RUN.accuracy = accuracy;
  PROGRESS.blanks.setsCompleted++;
  PROGRESS.blanks.totalScore += accuracy;
  PROGRESS.blanks.bestScore = Math.max(PROGRESS.blanks.bestScore, accuracy);
  PROGRESS.blanks.timeSpentSec += Math.round((Date.now()-BLANK_RUN.startedAt)/1000);
  await saveProgress('blanks');
  await pushHistory({date:todayStr(), section:'blanks', score:accuracy});
  go('blanks-report');
}

function viewBlanksReport(){
  const d = BLANK_RUN.details;
  const wrong = d.length - BLANK_RUN.correct;
  return `
  <div class="card pad-lg" style="margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
    <div>
      <div class="section-heading">Paper submitted</div>
      <h2 style="font-size:20px;">${BLANK_RUN.accuracy}% accuracy</h2>
    </div>
    <span class="chip chip-brand">${BLANK_RUN.correct}/${d.length} correct</span>
  </div>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px;">
    ${metricTile('Correct',BLANK_RUN.correct,'var(--green)')}
    ${metricTile('Wrong',wrong,'var(--red)')}
    ${metricTile('Score','/'+d.length,'var(--brand)')}
    ${metricTile('Accuracy',BLANK_RUN.accuracy+'%')}
  </div>
  <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
    ${d.map((q,i)=>`
      <div class="card pad-md">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <span style="font-size:11.5px; color:var(--text-faint);" class="mono">Q${i+1} · ${q.type} · ${q.difficulty||''}</span>
          <span class="chip ${q.ok?'chip-green':'chip-red'}">${q.ok?'Correct':'Wrong'}</span>
        </div>
        <div style="font-size:13.5px; margin-bottom:6px;">${escapeHtml(q.sentence.replace('___', '【'+(q.userAns||'…')+'】'))}</div>
        <div style="font-size:12.5px; color:var(--text-faint);">Your answer: <b style="color:var(--text);">${escapeHtml(q.userAns)||'—'}</b> &nbsp;·&nbsp; Correct: <b style="color:var(--text);">${escapeHtml(q.answers[0])}</b></div>
        <div style="font-size:12px; color:var(--text-faint); margin-top:4px;">${escapeHtml(q.explanation||'')}</div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick='toggleBookmark({type:"Fill in the Blanks",text:"${escapeHtml(q.sentence)}"}); go("blanks-report")'>${BOOKMARKS.some(b=>b.text===q.sentence)?'Bookmarked':'Bookmark'}</button>
      </div>`).join('')}
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="startBlanksPaper()">Practice again</button>
    <button class="btn btn-secondary" onclick="window.print()">Export as PDF</button>
    <button class="btn btn-secondary" onclick="go('dashboard')">Back to dashboard</button>
  </div>`;
}

function startEmailSession(){

}
function startEmailWriting(){

  clearInterval(window.__autosave);
  window.__autosave = setInterval(()=>{

function viewEmailRun(){
  if(!EMAIL_RUN) return `<div class="empty-state">Loading…</div>`;
  const {phase, scenario} = EMAIL_RUN;
  if(phase==='evaluating') return loadingCard('Evaluating your email', 'Scoring tone, grammar, structure and completeness.');
  return `
  <div style="display:grid; grid-template-columns:2fr 1fr; gap:18px;">
    <div class="card pad-lg">
      <span class="chip chip-brand" style="margin-bottom:14px; display:inline-block;">${scenario.title}</span>
      ${phase==='reading' ? `

        <textarea id="emailBox" style="height:280px;" placeholder="To: ...&#10;Subject: ...&#10;&#10;Dear ..." oninput="EMAIL_RUN.text=this.value"></textarea>

      `}
    </div>

async function submitEmail(auto){
  if(EMAIL_RUN.submitted) return;
  EMAIL_RUN.submitted=true;
  stopTimer(); clearInterval(window.__autosave);
  EMAIL_RUN.phase='evaluating'; render();
  const s = EMAIL_RUN.scenario;
  const ai = await callClaude(
    "You are a strict TCS NQT email-writing evaluator grading corporate professional emails. Reply with ONLY valid JSON, no markdown.",
    `SCENARIO: ${s.prompt}\n\nUSER'S EMAIL:\n${EMAIL_RUN.text||'(nothing written)'}\n\nReturn JSON exactly in this shape:\n{"subjectLine":0-10,"greeting":0-10,"professionalTone":0-10,"grammar":0-10,"vocabulary":0-10,"clarity":0-10,"completeness":0-10,"structure":0-10,"formatting":0-10,"closing":0-10,"overallScore":0-10,"mistakes":["...","..."],"suggestions":["...","..."],"modelAnswer":"a full well-written model email for this scenario"}`,
    1400
  );
  EMAIL_RUN.evalResult = ai || fallbackEmailEval(EMAIL_RUN.text, s);
  const overallPct = Math.round(EMAIL_RUN.evalResult.overallScore*10);
  PROGRESS.email.setsCompleted++;
  PROGRESS.email.totalScore += overallPct;
  PROGRESS.email.bestScore = Math.max(PROGRESS.email.bestScore, overallPct);
  PROGRESS.email.timeSpentSec += Math.round((Date.now()-EMAIL_RUN.startedAt)/1000);
  await saveProgress('email');
  await pushHistory({date:todayStr(), section:'email', score:overallPct});
  go('email-report');
}

function fallbackEmailEval(text, scenario){
  const hasSubject = /subject\s*:/i.test(text);
  const hasGreeting = /dear|hi |hello/i.test(text);
  const hasClosing = /regards|sincerely|thanks|thank you/i.test(text);
  const wc = (text.match(/\w+/g)||[]).length;
  const score = (hasSubject?1.5:0)+(hasGreeting?1.5:0)+(hasClosing?1.5:0)+(wc>60?2:1)+3;
  return {
    subjectLine:hasSubject?8:3, greeting:hasGreeting?8:3, professionalTone:6, grammar:6, vocabulary:6,
    clarity:6, completeness: wc>60?7:4, structure:6, formatting:hasSubject&&hasGreeting?7:4, closing:hasClosing?8:3,
    overallScore: Math.min(10,Math.round(score*10)/10),
    mistakes: [!hasSubject?"Missing a clear subject line.":null, !hasGreeting?"Missing a proper greeting.":null, !hasClosing?"Missing a professional closing.":null].filter(Boolean),
    suggestions: ["Keep paragraphs short and focused on one idea each.","Always include a clear subject line and formal closing.","Proofread for grammar before submitting."],
    modelAnswer: `Subject: ${scenario.title}\n\nDear [Recipient],\n\n[A concise, professional email addressing: ${scenario.prompt}]\n\nRegards,\n[Your Name]`
  };
}

    </div>
    <div class="card pad-md">
      <div class="section-heading">Suggestions</div>
      <ul style="font-size:13px; padding-left:18px; margin:0;">${(e.suggestions||[]).map(m=>`<li>${escapeHtml(m)}</li>`).join('')}</ul>
    </div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px;">
    <div class="card pad-md">
      <div class="section-heading">Your email</div>
      <pre style="font-size:13px; white-space:pre-wrap; font-family:inherit; margin:0;">${escapeHtml(EMAIL_RUN.text)||'(nothing written)'}</pre>

    <div class="card pad-md">
      <div class="section-heading">Model answer</div>
      <pre style="font-size:13px; white-space:pre-wrap; font-family:inherit; margin:0;">${escapeHtml(e.modelAnswer||'')}</pre>
    </div>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="startEmailSession()">Practice again</button>
    <button class="btn btn-secondary" onclick="window.print()">Export as PDF</button>
    <button class="btn btn-secondary" onclick="go('dashboard')">Back to dashboard</button>
  </div>`;

/* ============================================================
   view-progress.js — cross-section progress dashboard
   ============================================================ */

function viewProgress(){
  const totalSets = PROGRESS.passage.setsCompleted+PROGRESS.blanks.setsCompleted+PROGRESS.email.setsCompleted;
  const avgAll = HISTORY.length ? Math.round(HISTORY.reduce((s,h)=>s+h.score,0)/HISTORY.length) : 0;
  const highest = HISTORY.length ? Math.max(...HISTORY.map(h=>h.score)) : 0;
  const weekAgo = Date.now()-7*864e5;
  const weeklyCount = HISTORY.filter(h=>new Date(h.date).getTime()>=weekAgo).length;
  const todayCount = HISTORY.filter(h=>h.date===todayStr()).length;
  const avg = p => p.setsCompleted ? Math.round(p.totalScore/p.setsCompleted) : 0;

  return `
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:18px;">
    ${progressStat('Daily practice',todayCount+' sets')}
    ${progressStat('Weekly practice',weeklyCount+' sets')}
    ${progressStat('Average score',avgAll+'%')}
    ${progressStat('Highest score',highest+'%')}
    ${progressStat('Streak',STREAK.current+' days')}
  </div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;">
    ${progressStat('Passage recall accuracy', avg(PROGRESS.passage)+'%')}
    ${progressStat('Fill in the blank accuracy', avg(PROGRESS.blanks)+'%')}
    ${progressStat('Email writing score', avg(PROGRESS.email)+'%')}
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px;">
    <div class="card pad-md"><div class="section-heading">Score trend</div><canvas id="trendChart" height="180"></canvas></div>
    <div class="card pad-md"><div class="section-heading">Section comparison</div><canvas id="sectionChart" height="180"></canvas></div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px;">
    <div class="card pad-md">
      <div class="section-heading" style="color:var(--red);">Weak topics</div>
      <ul style="font-size:13px; padding-left:18px; margin:0;">${weakTopics().map(t=>`<li>${t}</li>`).join('')||'<li>Not enough data yet</li>'}</ul>
    </div>
    <div class="card pad-md">
      <div class="section-heading">Recommended practice</div>
      <ul style="font-size:13px; padding-left:18px; margin:0;">${recommendPractice().map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
  </div>
  <button class="btn btn-secondary no-print" onclick="window.print()">Export full report as PDF</button>`;
}
function progressStat(label,val){
  return `<div class="card pad-md" style="text-align:center;"><div class="mono" style="font-weight:700; font-size:16px; color:var(--brand);">${val}</div><div style="font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; margin-top:3px;">${label}</div></div>`;
}
function weakTopics(){
  const counts={};
  MISTAKES.forEach(m=>{ counts[m.type]=(counts[m.type]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t,c])=>`${t} — ${c} mistake(s)`);
}
function recommendPractice(){
  const secs=[['Passage Recall',PROGRESS.passage],['Fill in the Blanks',PROGRESS.blanks],['Email Writing',PROGRESS.email]];
  const withAvg = secs.map(([n,p])=>[n, p.setsCompleted ? p.totalScore/p.setsCompleted : -1]);
  withAvg.sort((a,b)=>a[1]-b[1]);
  return withAvg.map(([n,v])=> v<0 ? `Try ${n} — you haven't practiced this yet.` : `Focus on ${n} — current average ${Math.round(v)}%.`);
}
function drawProgressCharts(){
  const trendCtx = document.getElementById('trendChart');
  if(trendCtx){
    new Chart(trendCtx,{type:'line', data:{labels:HISTORY.map(h=>h.date), datasets:[{label:'Score %', data:HISTORY.map(h=>h.score), borderColor:'#4338CA', backgroundColor:'rgba(67,56,202,.12)', tension:.3, fill:true}]}, options:{plugins:{legend:{display:false}}, scales:{y:{max:100}}}});
  }
  const secCtx = document.getElementById('sectionChart');
  if(secCtx){
    const avg = p => p.setsCompleted ? Math.round(p.totalScore/p.setsCompleted) : 0;
    new Chart(secCtx,{type:'bar', data:{labels:['Passage Recall','Fill Blanks','Email Writing'], datasets:[{label:'Avg %', data:[avg(PROGRESS.passage),avg(PROGRESS.blanks),avg(PROGRESS.email)], backgroundColor:'#4338CA', borderRadius:4}]}, options:{plugins:{legend:{display:false}}, scales:{y:{max:100}}}});
  }
}
